<link rel="stylesheet" href="/Invoxa/FrontEnd/Components/perfil/Styles/perfil.css">
<link rel="stylesheet" href="/Invoxa/FrontEnd/Components/configuracion/Styles/configuracion.css">

<div class="invoxa-perfil">

    <!-- ===== Columna izquierda: tarjeta de empresa ===== -->
    <aside class="perfil-tarjeta">
        <button class="perfil-volver" type="button" aria-label="Volver">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </button>

        <div class="perfil-avatar config-avatar">
            <img src="/Invoxa/FrontEnd/Api/config/configuracion/fotoFiscal.png" alt="Perfil fiscal">
        </div>

        <h2 class="perfil-nombre">Razón social</h2>
        <p class="perfil-rol">RFC</p>

        <p class="perfil-miembro">Fundada desde enero 2026</p>
    </aside>

    <!-- ===== Columna derecha ===== -->
    <section class="perfil-detalle">

        <div class="perfil-card">
            <h3 class="perfil-card-titulo">
                Perfil fiscal
                <span class="perfil-card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 21h18"></path>
                        <path d="M5 21V5a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v16"></path>
                        <path d="M15 21V9h2a2 2 0 0 1 2 2v10"></path>
                        <line x1="9" y1="7" x2="11" y2="7"></line>
                        <line x1="9" y1="11" x2="11" y2="11"></line>
                        <line x1="9" y1="15" x2="11" y2="15"></line>
                    </svg>
                </span>
            </h3>

            <form class="perfil-card-body" id="form-fiscal" onsubmit="return false">
                <div class="perfil-grid-3">
                    <div class="perfil-campo">
                        <label for="config-razon-social">Razón social</label>
                        <input type="text" id="config-razon-social" name="razon_social" placeholder="Empresa S.A">
                    </div>
                    <div class="perfil-campo">
                        <label for="config-rfc">RFC</label>
                        <input type="text" id="config-rfc" name="rfc" placeholder="EME8763H21">
                    </div>
                    <div class="perfil-campo">
                        <label for="config-celular">Celular directo</label>
                        <input type="tel" id="config-celular" name="celular" placeholder="664-123-1234">
                    </div>
                </div>

                <div class="config-fila-doble">
                    <div class="perfil-campo config-campo-correo">
                        <label for="config-correo">Correo electrónico</label>
                        <input type="email" id="config-correo" name="correo" placeholder="correo@contacto.com">
                    </div>
                    <div class="perfil-campo config-campo-moneda">
                        <label for="config-moneda">Moneda principal</label>
                        <select id="config-moneda" name="moneda" class="config-select">
                            <option value="" disabled selected>MXM-Peso Mexicano</option>
                            <option value="MXN">MXN - Peso Mexicano</option>
                            <option value="USD">USD - Dólar estadounidense</option>
                            <option value="EUR">EUR - Euro</option>
                        </select>
                    </div>
                    <button class="perfil-btn-editar" type="submit">Editar</button>
                </div>
            </form>
        </div>

        <div class="perfil-card">
            <h3 class="perfil-card-titulo">
                Tiempos de pago
                <span class="perfil-card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="13" r="8"></circle>
                        <line x1="12" y1="13" x2="12" y2="9"></line>
                        <line x1="9" y1="2" x2="15" y2="2"></line>
                        <line x1="18.5" y1="6.5" x2="20" y2="5"></line>
                    </svg>
                </span>
            </h3>

            <form class="perfil-card-body" id="form-tiempos" onsubmit="return false">
                <div class="config-grid-2">
                    <div class="perfil-campo">
                        <label for="config-plazo">Plazo de pago</label>
                        <input type="number" id="config-plazo" name="plazo_pago" placeholder="Número de días">
                    </div>
                    <div class="perfil-campo">
                        <label for="config-corte">Día de corte</label>
                        <input type="number" id="config-corte" name="dia_corte" placeholder="Día del mes">
                    </div>
                </div>

                <div class="perfil-fila-editar">
                    <div class="perfil-campo perfil-campo-ancho">
                        <label for="config-antiguedad">Máxima antigüedad</label>
                        <input type="text" id="config-antiguedad" name="max_antiguedad" placeholder="Solo el mes actual">
                    </div>
                    <button class="perfil-btn-editar" type="submit">Editar</button>
                </div>
            </form>
        </div>

    </section>
</div>

<script src="/Invoxa/FrontEnd/Components/configuracion/Methods/configuracion.js"></script>
