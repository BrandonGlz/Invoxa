<link rel="stylesheet" href="/Invoxa/FrontEnd/Components/header/Styles/header.css">

<div class="header-container" id="header">
    <div class="header-left">
        <img src="/Invoxa/FrontEnd/Api/login/invoxa.png" alt="header" class="img">
    </div>

    <div class="header-right">
        <button class="btn-notificacion">
            <img src="/Invoxa/FrontEnd/Api/icons/header-notificaciones.png" alt="Notificaciones" class="icono-notificacion">
        </button>

        <div class="perfil-container">
            <button class="btn-perfil" id="btn-perfil-toggle">
                <img src="/Invoxa/FrontEnd/Api/icons/header-perfil.png" alt="perfil" class="icono-perfil">
                <div class="perfil-textos">
                    <span class="perfil-nombre">Nombre usuario</span>
                    <span class="perfil-rol">Rol</span>
                </div>
                <span class="icono-flecha">▼</span>
            </button>

            <div class="dropdown-perfil" id="dropdown-perfil">
                <div class="dropdown-header">
                    <img src="/Invoxa/FrontEnd/Api/images/fotoPerfil.png" alt="avatar" class="avatar-placeholder">
                    <div class="dropdown-info">
                        <span class="info-nombre">Nombre usuario</span>
                        <span class="info-correo">correo@electronico.com</span>
                    </div>
                </div>
                <hr>
                <div class="dropdown-body">
                    <a href="#perfil" class="dropdown-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <span>Mi perfil</span>
                    </a>
                    <a href="#configuracion" class="dropdown-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                        <span>Configuraciones</span>
                    </a>
                </div>
                <hr>
                <div class="dropdown-footer">
                    <a href="/Invoxa/FrontEnd/Components/login/login.html" class="dropdown-item logout" id="btn-cerrar-sesion">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        <span>Cerrar sesión</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
