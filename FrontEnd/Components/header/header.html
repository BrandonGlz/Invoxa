<link rel="stylesheet" href="/Invoxa/FrontEnd/Components/header/Styles/header.css">

<div class="header-container" id="header">
    <div class="header-left">
        <img src="/Invoxa/FrontEnd/Api/login/invoxa.png" alt="header" class="img">
    </div>

    <div class="header-right">
        <button class="btn-notificacion">
            <img src="/Invoxa/FrontEnd/Api/header/notificaciones.png" alt="Notificaciones" class="icono-notificacion">
        </button>

        <div class="perfil-container">
            <button class="btn-perfil" id="btn-perfil-toggle">
                <img src="/Invoxa/FrontEnd/Api/header/configuracion.png" alt="perfil" class="icono-perfil">
                <div class="perfil-textos">
                    <span class="perfil-nombre">Nombre usuario</span>
                    <span class="perfil-rol">Rol</span>
                </div>
                <span class="icono-flecha">▼</span>
            </button>

            <div class="dropdown-perfil" id="dropdown-perfil">
                <div class="dropdown-header">
                    <img src="/Invoxa/FrontEnd/Api/config/mi_perfil/fotoPerfil.png" alt="avatar" class="avatar-placeholder">
                    <div class="dropdown-info">
                        <span class="info-nombre">Nombre usuario</span>
                        <span class="info-correo">correo@electronico.com</span>
                    </div>
                </div>
                <hr>
                <div class="dropdown-body">
                    <a href="#perfil" class="dropdown-item">
                        <img src="/Invoxa/FrontEnd/Api/header/mi_perfil.png" alt="Mi perfil" class="icono-dropdown">
                        <span>Mi perfil</span>
                    </a>
                    <a href="#configuracion" class="dropdown-item">
                        <img src="/Invoxa/FrontEnd/Api/header/configuraciones.png" alt="Configuraciones" class="icono-dropdown">
                        <span>Configuraciones</span>
                    </a>
                </div>
                <hr>
                <div class="dropdown-footer">
                    <a href="/Invoxa/FrontEnd/Components/login/login.html" class="dropdown-item logout" id="btn-cerrar-sesion">
                        <img src="/Invoxa/FrontEnd/Api/header/cerrar_sesion.png" alt="Cerrar sesión" class="icono-dropdown">
                        <span>Cerrar sesión</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
