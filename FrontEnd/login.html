<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Invoxa - Login</title>
    <link rel="stylesheet" href="/Invoxa/FrontEnd/Css/StyleGeneral.css">
    <link rel="stylesheet" href="/Invoxa/FrontEnd/Components/Login/Styles/login.css">
</head>
<body class="login-body">

    <div class="div-login-tarjeta">
        <div class="div-login-izquierda">
            <div class="div-login-logo">
                <img src="/Invoxa/FrontEnd/Api/logo/circulos.svg" alt="Marca Invoxa" class="img-login-marca">
                <img src="/Invoxa/FrontEnd/Api/logo/invoxanombre.jpg" alt="Invoxa" class="img-login-logo">
            </div>

            <form id="frm-login">
                <div class="div-campo">
                    <label for="inp-usuario" class="lbl-campo">Usuario</label>
                    <input type="text" id="inp-usuario" name="user" placeholder="Ingresa tu usuario" required>
                </div>

                <div class="div-campo">
                    <label for="inp-password" class="lbl-campo">Contraseña</label>
                    <input type="password" id="inp-password" name="password" placeholder="Ingresa tu contraseña" required>
                </div>

                <div class="div-recuperar">
                    <a href="/Invoxa/FrontEnd/Components/Login/recovery_passwd.html" class="lnk-olvide">Olvidé mi contraseña</a>
                </div>

                <div id="div-error-login"></div>

                <button type="submit" id="btn-login">Iniciar sesión</button>
            </form>
        </div>

        <div class="div-login-derecha">
            <div class="div-login-panel">
                <div class="div-login-icono">
                    <img src="/Invoxa/FrontEnd/Api/logo/invoxa.png" alt="Invoxa" class="img-login-icono">
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/Invoxa/FrontEnd/Components/Login/Methods/login.js"></script>

</body>
</html>
